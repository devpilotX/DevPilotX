<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Accent dots -->
  <circle cx="120" cy="120" r="60" fill="rgba(201,40,26,0.08)"/>
  <circle cx="1080" cy="555" r="80" fill="rgba(201,40,26,0.06)"/>
  <circle cx="600" cy="337" r="200" fill="rgba(255,255,255,0.015)"/>
  <!-- Code brackets -->
  <text x="520" y="310" font-family="monospace" font-size="72" fill="rgba(255,255,255,0.12)" font-weight="bold">&lt;/&gt;</text>
  <!-- Logo text -->
  <text x="600" y="390" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="3">VALUE.CODES</text>
</svg>
